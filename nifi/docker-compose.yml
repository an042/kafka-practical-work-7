# docker-compose.yml — запуск Apache NiFi 1.28.1 локально
# Используется для интеграции с Yandex Cloud Managed Kafka (Задание 2)

version: "3.8"                              # версия формата docker-compose

services:
  nifi:                                     # имя сервиса
    image: apache/nifi:1.28.1              # образ NiFi версии 1.28.1
    container_name: nifi                   # имя контейнера

    ports:
      - "8080:8080"                         # HTTP UI: localhost:8080/nifi

    environment:
      NIFI_WEB_HTTP_PORT: "8080"           # порт HTTP (без TLS, для учебного стенда)
      SINGLE_USER_CREDENTIALS_USERNAME: admin   # логин UI
      SINGLE_USER_CREDENTIALS_PASSWORD: admin12345678  # пароль UI (мин. 12 симв.)

    volumes:
      # папка для сертификатов (truststore.p12 + CA-сертификат Яндекса)
      - ./certs:/opt/nifi/nifi-current/conf/certs:ro

    restart: unless-stopped               # перезапускать контейнер при падении
